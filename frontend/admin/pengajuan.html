<form id="application-form" class="space-y-6">

    <input id="app-nama" type="text" placeholder="Nama Lengkap" required>

    <input id="app-email" type="email" placeholder="Email" required>

    <input id="app-telepon" type="tel" placeholder="Nomor Telepon" required>

    <input id="app-jenis" type="text" placeholder="Jenis Usaha" required>

    <input id="app-nominal" type="text" placeholder="Rp 50.000.000" required>

    <textarea id="app-keperluan" rows="4" placeholder="Keperluan Pinjaman" required>
    </textarea>

    <button type="submit">
        Kirim Pengajuan
    </button>

</form>
