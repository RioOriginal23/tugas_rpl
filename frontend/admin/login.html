<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex justify-center items-center min-h-screen">

    <div class="bg-white p-8 rounded shadow w-96">
        <h1 class="text-2xl font-bold mb-6 text-center">
            Login Admin
        </h1>
        <form id="loginForm">

            <input id="email" type="email" placeholder="Email" class="w-full border p-2 mb-4 rounded" required>

            <input id="password" type="password" placeholder="Password" class="w-full border p-2 mb-4 rounded" required>

            <button type="submit" id="loginBtn" class="w-full bg-blue-600 text-white p-2 rounded">

                Login

            </button>

        </form>

        <p id="message" class="mt-4 text-center"></p>
    </div>


    <script src="../API/api.js"></script>
    <script src="../API/auth.js"></script>
    <script src="../API/login.js"></script>
</body>


</html>
