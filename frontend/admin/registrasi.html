<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrasi User</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-900 min-h-screen flex items-center justify-center">

    <div class="bg-slate-800 p-8 rounded-xl w-full max-w-md">
        <h1 class="text-3xl text-white font-bold text-center mb-6">
            Registrasi
        </h1>

        <form id="registerForm" class="space-y-4">

            <input type="text" id="nama" placeholder="Nama Lengkap" class="w-full p-3 rounded-lg" required>

            <input type="email" id="email" placeholder="Email" class="w-full p-3 rounded-lg" required>

            <input type="password" id="password" placeholder="Password" class="w-full p-3 rounded-lg" required>

            <button class="w-full bg-blue-600 text-white py-3 rounded-lg">
                Daftar
            </button>

        </form>
    </div>

</body>

</html>
