<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengajuan Pinjaman</title>
    <script src="https://cdn.tailwindcss.com/"></script>
</head>

<body class="bg-gray-50">
    <script>
        if (!localStorage.getItem('token')) window.location.href = 'login.html';
    </script>

    <nav class="bg-blue-600 text-white p-4 flex justify-between items-center shadow-md">
        <h1 class="text-xl font-bold">P2P Lending - Peminjam</h1>
        <div class="space-x-4">
            <a href="dashboard.html" class="hover:underline">Dashboard</a>
            <a href="pengajuan.html" class="underline">Ajukan Pinjaman</a>
            <a href="riwayat.html" class="hover:underline">Riwayat</a>
        </div>
    </nav>

    <main class="max-w-md mx-auto mt-10 p-6 bg-white rounded-lg shadow">
        <h2 class="text-2xl font-bold mb-6 text-gray-800">Formulir Pinjaman Baru</h2>
        <form id="loanForm" class="space-y-4">
            <div>
                <label class="block text-gray-700">Nominal Pinjaman (IDR)</label>
                <input type="number" id="amount"
                    class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                    placeholder="Contoh: 10000000" required>
            </div>
            <div>
                <label class="block text-gray-700">Keperluan Pinjaman</label>
                <textarea id="purpose" rows="4"
                    class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                    placeholder="Jelaskan detail tujuan pinjaman modal usaha Anda..." required></textarea>
            </div>
            <button type="submit"
                class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition">Kirim
                Pengajuan</button>
        </form>
    </main>

    <script>
        // API CALL KE BACKEND UNTUK SUBMIT PINJAMAN
        document.getElementById('loanForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const amount = document.getElementById('amount').value;
            const purpose = document.getElementById('purpose').value;

            try {
                const response = await fetch('http://localhost:3000/api/loans', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    },
                    body: JSON.stringify({ amount, purpose })
                });

                if (response.ok) {
                    alert('Pengajuan pinjaman berhasil dibuat! Menunggu persetujuan Admin.');
                    window.location.href = 'riwayat.html';
                } else {
                    const errData = await response.json();
                    alert(errData.message || 'Gagal mengajukan pinjaman');
                }
            } catch (err) {
                alert('Terjadi kesalahan koneksi server.');
            }
        });
    </script>
</body>

</html>
